<div class="job-details">
    <h2>Job Details</h2>

    <div class="row mb-12">
        <div class="col-md-12 required-field">
            <label for="job_name" class="form-label">Job Name</label>
            <input type="text" id="job_name" name="name" class="form-control autosave-input"
                value="{{ job.name|default_if_none:'' }}" required>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6 position-relative">
            <div class="form-group required-field">
                <label for="client_name" class="form-label">Client</label>
                <input type="text" id="client_name" class="form-control" value="{{ job.client.name|default_if_none:'' }}">
                <input type="hidden" id="client_id" name="client_id" class="autosave-input"
                    value="{{ job.client.id|default:'' }}" required>
                <input type="hidden" id="client_xero_id" name="client_xero_id" class="autosave-input"
                    value="{{ job.client.xero_contact_id|default:'' }}">
            </div>
            <div id="clientSuggestionsContainer" class="suggestions-container"></div>
        </div>

        <div class="col-md-6 required-field">
            <label for="contact_person" class="form-label">Contact</label>
            <input type="text" id="contact_person" name="contact_person" class="form-control autosave-input"
                value="{{ job.contact_person|default_if_none:'' }}" required>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="contact_phone" class="form-label">Phone Number</label>
            <input type="text" id="contact_phone" name="contact_phone" class="form-control autosave-input"
                value="{{ job.contact_phone|default_if_none:'' }}">
        </div>
        <div class="col-md-4">
            <label for="order_number" class="form-label">Order Number</label>
            <input type="text" id="order_number" name="order_number" class="form-control autosave-input"
                value="{{ job.order_number|default_if_none:'' }}">
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-12">
            <label for="job_description" class="form-label">Description</label>
            <textarea id="job_description" name="description" class="form-control autosave-input"
                rows="3">{{ job.description|default_if_none:'' }}</textarea>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-12">
            <label for="material_gauge_quantity" class="form-label">Material / Gauge / Quantity</label>
            <textarea id="material_gauge_quantity" name="material_gauge_quantity" class="form-control autosave-input"
                rows="3">{{ job.material_gauge_quantity|default_if_none:'' }}</textarea>
        </div>
    </div>

    <div id="job-details" class="alert-container"></div>

</div>
